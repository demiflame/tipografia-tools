<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Типография — калькулятор и счета</title>
<style>
:root{
  --ink:#1B1B19;
  --ink-soft:#5B5750;
  --paper:#FAF8F3;
  --surface:#FFFFFF;
  --line:#E3DCCB;
  --line-soft:#EFEADB;
  --cyan:#0E7C86;
  --cyan-dark:#0A5F67;
  --coral:#D6502F;
  --coral-dark:#B53E22;
  --ok:#2E7D4F;
  --danger:#C23B3B;
  --shadow:0 1px 2px rgba(27,27,25,.06),0 6px 18px rgba(27,27,25,.07);
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Segoe UI","Helvetica Neue",Arial,"Noto Sans",sans-serif;
  font-size:14.5px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
input,select,button,textarea{font-family:inherit;font-size:inherit;color:inherit;}
input[type=number],input[type=text]{
  font-variant-numeric:tabular-nums;
}
h1,h2,h3{margin:0;}
button{cursor:pointer;}

/* ---------- topbar (mobile-first: компактно, табы скроллятся в одну строку) ---------- */
.topbar{
  position:sticky;top:0;z-index:20;
  background:var(--surface);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1180px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.2px;white-space:nowrap;flex:none;}
.regmark{width:20px;height:20px;flex:none;}
.brand-title{font-size:15px;}
.brand-sub{display:none;font-size:11.5px;color:var(--ink-soft);font-weight:400;}
.tabs{
  display:flex;gap:4px;margin-left:auto;flex-wrap:nowrap;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:none;border:1px solid transparent;background:transparent;
  padding:11px 13px;border-radius:8px;font-weight:600;color:var(--ink-soft);white-space:nowrap;
}
.tab-btn:hover{background:var(--line-soft);}
.tab-btn.active{background:var(--ink);color:#fff;}

main{max-width:1180px;margin:0 auto;padding:14px 14px 40px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
#tab-calc.active{padding-bottom:74px;} /* место под закреплённую панель итога на телефоне */

/* ---------- calculator layout (mobile-first: один столбец, категории — горизонтальная лента) ---------- */
.calc-layout{display:flex;flex-direction:column;gap:14px;}
.product-nav{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(92px, 1fr));gap:6px;
  margin:0;padding:0;
}
.nav-group{display:contents;}
.nav-group-title{display:none;}
.nav-item{
  display:flex;align-items:center;justify-content:center;gap:4px;min-width:0;
  padding:6px 7px;border-radius:8px;border:1px solid var(--line);
  font-weight:600;color:var(--ink);text-align:center;background:var(--surface);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;
}
.nav-item:hover{background:var(--line-soft);}
.nav-item.active{background:var(--ink);border-color:var(--ink);box-shadow:none;color:#fff;}
.nav-item .ico{font-size:13px;flex:none;}

.calc-main{display:flex;flex-direction:column;gap:14px;min-width:0;}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.product-form{padding:16px;min-width:0;}
.product-form h2{font-size:17px;margin-bottom:2px;}
.product-form .hint{color:var(--ink-soft);font-size:12.5px;margin-bottom:14px;}
.field-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.list-field{display:flex;flex-direction:column;gap:10px;}
.list-item-card{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:var(--paper);}
.list-item-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
.list-item-card .field-grid{grid-template-columns:1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1 / -1;}
.field label{font-size:12.5px;font-weight:600;color:var(--ink-soft);}
.field input,.field select{
  border:1px solid var(--line);border-radius:7px;padding:11px 12px;background:#fff;
  font-size:16px; /* >=16px — чтобы iOS не зумил страницу при фокусе на поле */
}
.field input:focus,.field select:focus{outline:2px solid var(--cyan);outline-offset:-1px;border-color:var(--cyan);}
.field .resolved{font-size:12.5px;color:var(--ink-soft);padding-top:2px;}
.field-error{color:var(--danger);font-size:12.5px;margin-top:10px;font-weight:600;}

.result-panel{padding:16px;}
.result-panel .label{font-size:12px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.result-panel .unit{font-size:13px;color:var(--ink-soft);margin-top:2px;}
.result-total{font-size:28px;font-weight:800;color:var(--coral);margin:8px 0 2px;font-variant-numeric:tabular-nums;}
.result-specs{font-size:12.5px;color:var(--ink-soft);margin:10px 0 14px;line-height:1.5;}
.result-actions{display:flex;flex-direction:column;gap:8px;}
.corners{position:relative;padding:14px;}
.corner{position:absolute;width:11px;height:11px;border:0;}
.corner.tl{top:4px;left:4px;border-top:2px solid var(--coral);border-left:2px solid var(--coral);}
.corner.tr{top:4px;right:4px;border-top:2px solid var(--coral);border-right:2px solid var(--coral);}
.corner.bl{bottom:4px;left:4px;border-bottom:2px solid var(--coral);border-left:2px solid var(--coral);}
.corner.br{bottom:4px;right:4px;border-bottom:2px solid var(--coral);border-right:2px solid var(--coral);}

/* закреплённая внизу панель «Итого» — на телефоне всегда под рукой, на десктопе скрыта (см. медиа-запрос) */
.mobile-total-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--surface);border-top:1px solid var(--line);
  box-shadow:0 -6px 18px rgba(27,27,25,.08);
  padding:10px 14px;padding-bottom:max(10px, env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:12px;
}
.mobile-total-bar .mtb-info{flex:1;min-width:0;overflow:hidden;}
.mobile-total-bar .mtb-label{font-size:10.5px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.mobile-total-bar .mtb-sum{font-size:19px;font-weight:800;color:var(--coral);font-variant-numeric:tabular-nums;line-height:1.25;white-space:nowrap;}
.mobile-total-bar .btn{flex:none;}

.btn{
  display:inline-flex;align-items:center;gap:7px;justify-content:center;
  border-radius:8px;border:1px solid transparent;padding:12px 15px;font-weight:700;
  font-size:13.5px;white-space:nowrap;
}
.btn-primary{background:var(--cyan);color:#fff;}
.btn-primary:hover{background:var(--cyan-dark);}
.btn-primary:disabled{background:#BFC4C3;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{background:var(--line-soft);}
.btn-danger{background:transparent;border:1px solid var(--line);color:var(--danger);}
.btn-danger:hover{background:#FBEAEA;}
.btn-block{width:100%;}

/* ---------- invoice (mobile-first: карточки вместо широкой таблицы) ---------- */
.invoice-toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.invoice-toolbar .btn{width:100%;}
.invoice-toolbar .spacer{display:none;}
.invoice-empty{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.custom-line-card{padding:14px 14px 16px;margin-bottom:14px;}
.custom-line-row{display:flex;flex-direction:column;gap:8px;}
.custom-line-row input{border:1px solid var(--line);border-radius:7px;padding:11px 12px;background:#fff;font-size:16px;}
.custom-line-row .btn{width:100%;}
.invoice-table-wrap{overflow:visible;border:none;background:transparent;}
table.invoice{width:100%;border-collapse:collapse;min-width:0;display:block;}
table.invoice thead{display:none;}
table.invoice tbody{display:block;}
table.invoice tr{
  display:block;position:relative;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:10px 12px;margin-bottom:10px;
}
table.invoice td{
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  padding:6px 0;border-bottom:1px dashed var(--line-soft);text-align:right;
}
table.invoice tr td:last-child{border-bottom:none;}
table.invoice td:before{
  content:attr(data-label);flex:none;text-align:left;
  font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;
}
table.invoice td.idx{display:none;}
table.invoice td.action-cell{position:absolute;top:8px;right:8px;border:none;padding:0;}
table.invoice td.action-cell:before{content:"";}
table.invoice .specs{color:var(--ink-soft);font-size:12.5px;}
table.invoice input.qty-edit,table.invoice input.price-edit{width:70px;border:1px solid var(--line);border-radius:6px;padding:6px;text-align:right;}
.row-del{background:none;border:none;color:var(--ink-soft);font-size:18px;line-height:1;padding:4px;}
.row-del:hover{color:var(--danger);}
.type-toggle{border-radius:5px;border:1px solid var(--line);padding:3px 7px;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px;}
.type-good{background:#EEF7EE;color:#2E7D4F;border-color:#A8D5B5;}
.type-service{background:#EEF0FF;color:#3B4FC4;border-color:#A8B4E8;}
.discount-row{display:flex;align-items:center;gap:10px;padding:12px 4px 4px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.discount-row input{width:70px;border:1px solid var(--line);border-radius:6px;padding:6px;text-align:right;}
.discount-saved{color:var(--ok);font-size:12.5px;font-weight:600;}
.invoice-group-btns{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0 4px;}
@media(max-width:759px){.invoice-group-btns{flex-direction:column;} .invoice-group-btns .btn{width:100%;}}
.invoice-total-bar{
  display:flex;justify-content:space-between;gap:14px;align-items:baseline;
  padding:10px 4px 4px;font-weight:700;
}
.invoice-total-bar .sum{font-size:24px;color:var(--coral);font-variant-numeric:tabular-nums;}

/* ---------- settings ---------- */
.settings-toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.settings-toolbar .btn{width:100%;}
.settings-toolbar .spacer{display:none;}
details.settings-section{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;
}
details.settings-section summary{
  cursor:pointer;padding:13px 16px;font-weight:700;list-style:none;display:flex;align-items:center;gap:10px;
}
details.settings-section summary::-webkit-details-marker{display:none;}
details.settings-section summary:before{content:"▸";color:var(--ink-soft);transition:transform .15s;}
details.settings-section[open] summary:before{transform:rotate(90deg);}
.settings-body{padding:4px 14px 16px;border-top:1px solid var(--line-soft);}
.settings-subtitle{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px;}
.plain-fields{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0;}
.plain-fields .field{flex:1 1 160px;}

.kv-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.kv-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.kv-row input[type=text]{flex:1 1 90px;min-width:0;}
.kv-row input[type=number]{flex:1 1 80px;min-width:0;}
.kv-row .sub-label{font-size:11px;color:var(--ink-soft);min-width:54px;}
.kv-row input,.grid-table input{border:1px solid var(--line);border-radius:6px;padding:8px;background:#fff;}
.icon-btn{
  flex:none;width:32px;height:32px;border-radius:6px;border:1px solid var(--line);
  background:#fff;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{border-color:var(--danger);color:var(--danger);}
.btn-add{
  border:1px dashed var(--line);background:transparent;border-radius:7px;
  padding:9px 12px;font-weight:600;color:var(--cyan-dark);font-size:12.5px;
}
.btn-add:hover{background:var(--line-soft);}

.grid-table-wrap{overflow:auto;margin:0 -14px;padding:0 14px;}
table.grid-table{border-collapse:collapse;margin-bottom:8px;}
table.grid-table th,table.grid-table td{border:1px solid var(--line-soft);padding:4px;}
table.grid-table th{background:var(--line-soft);font-size:11.5px;font-weight:700;color:var(--ink-soft);}
table.grid-table input[type=number]{width:72px;}
table.grid-table input.row-key{width:100px;font-weight:600;}
table.grid-table input.col-key{width:72px;font-weight:600;text-align:center;}

.tier-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tier-row span{font-size:12.5px;color:var(--ink-soft);}

.toast{
  position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:8px;font-weight:600;font-size:13.5px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:var(--shadow);z-index:50;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.meta-note{font-size:12.5px;color:var(--ink-soft);margin:10px 0;line-height:1.55;}
.danger-zone{border-top:1px dashed var(--line);margin-top:16px;padding-top:14px;}

/* =====================================================================
   ПЛАНШЕТ / ДЕСКТОП — достраиваем мобильную базу для широких экранов
   ===================================================================== */
@media (min-width: 760px){
  .mobile-total-bar{display:none;}
  #tab-calc.active{padding-bottom:0;}
  .toast{bottom:26px;}

  .topbar-inner{padding:12px 18px;gap:18px;}
  .brand-sub{display:block;}
  .tabs{flex-wrap:wrap;overflow:visible;}
  .tab-btn{padding:9px 14px;}

  main{padding:20px 18px 70px;}

  .calc-layout{flex-direction:row;gap:20px;align-items:flex-start;}
  .product-nav{
    flex:0 0 230px;display:block;
    position:sticky;top:78px;margin:0;padding:0;
    max-height:calc(100vh - 96px);overflow:auto;
  }
  .nav-group{display:block;}
  .nav-group-title{display:block;}
  .nav-item{
    width:100%;background:none;border-color:transparent;
    padding:8px 10px;font-size:14.5px;justify-content:flex-start;text-align:left;
    white-space:normal;overflow:visible;text-overflow:initial;
  }
  .nav-item .ico{font-size:inherit;width:18px;}
  .nav-item.active{background:var(--surface);border-color:var(--line);box-shadow:var(--shadow);color:var(--cyan-dark);}

  .calc-main{flex-direction:row;gap:18px;align-items:flex-start;}
  .product-form{flex:1;padding:18px 20px;}
  .field-grid{grid-template-columns:1fr 1fr;gap:12px 16px;}
  .list-item-card .field-grid{grid-template-columns:1fr 1fr;}
  .field input,.field select{padding:8px 10px;font-size:14.5px;}

  .result-panel{flex:0 0 270px;position:sticky;top:78px;}

  .invoice-toolbar{flex-direction:row;flex-wrap:wrap;align-items:center;}
  .invoice-toolbar .btn{width:auto;}
  .invoice-toolbar .spacer{display:block;flex:1;}
  .custom-line-row{flex-direction:row;align-items:center;}
  .custom-line-row input[type=text]{flex:2 1 200px;}
  .custom-line-row input[type=number]{flex:1 1 110px;}
  .custom-line-row .btn{width:auto;flex:none;}
  .settings-toolbar{flex-direction:row;flex-wrap:wrap;}
  .settings-toolbar .btn{width:auto;}
  .settings-toolbar .spacer{display:block;flex:1;}

  .invoice-table-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);}
  table.invoice{min-width:760px;display:table;}
  table.invoice thead{display:table-header-group;}
  table.invoice tbody{display:table-row-group;}
  table.invoice th{
    text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--ink-soft);border-bottom:1px solid var(--line);padding:10px 12px;background:var(--line-soft);
    position:sticky;top:0;
  }
  table.invoice tr{display:table-row;background:none;border:none;box-shadow:none;padding:0;margin:0;}
  table.invoice td{
    display:table-cell;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line-soft);
    vertical-align:top;
  }
  table.invoice td:before{content:none;}
  table.invoice tr:last-child td{border-bottom:none;}
  table.invoice td.idx{display:table-cell;color:var(--ink-soft);}
  table.invoice td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  table.invoice td.action-cell{position:static;padding:10px 12px;border-bottom:1px solid var(--line-soft);}
  .invoice-total-bar{justify-content:flex-end;padding:16px 4px 4px;}
  .invoice-total-bar .sum{font-size:26px;}

  .plain-fields .field{flex:0 0 190px;}
  .kv-row input[type=text]{flex:1 1 150px;}
  .kv-row input[type=number]{flex:0 0 110px;}
}
@media print{
  .topbar,.invoice-toolbar,#tab-calc,#tab-settings,.mobile-total-bar{display:none !important;}
  body{background:#fff;}
  table.invoice{display:table;}
  table.invoice thead{display:table-header-group;}
  table.invoice tbody{display:table-row-group;}
  table.invoice tr{display:table-row;background:none;border:none;box-shadow:none;}
  table.invoice td{display:table-cell;}
  table.invoice td:before{content:none;}
  table.invoice input{border:none;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <svg class="regmark" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#D6502F" stroke-width="1.6"/><line x1="12" y1="1" x2="12" y2="23" stroke="#D6502F" stroke-width="1.2"/><line x1="1" y1="12" x2="23" y2="12" stroke="#D6502F" stroke-width="1.2"/></svg>
      <div>
        <div class="brand-title">Типография</div>
        <div class="brand-sub">калькулятор стоимости и счета</div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="calc">🖨 Калькулятор</button>
      <button class="tab-btn" data-tab="invoice">🧾 Счёт <span id="invoiceCountBadge"></span></button>
      <button class="tab-btn" data-tab="settings">⚙️ Настройки цен</button>
    </nav>
  </div>
</header>

<main>

  <section id="tab-calc" class="tab-panel active">
    <div class="calc-layout">
      <nav class="product-nav" id="productNav"></nav>
      <div class="calc-main">
        <div class="card product-form" id="productForm"></div>
        <aside class="card result-panel" id="resultPanel"></aside>
      </div>
    </div>
    <div class="mobile-total-bar" id="mobileTotalBar">
      <div class="mtb-info">
        <div class="mtb-label">Итого</div>
        <div class="mtb-sum" id="mtbSum">—</div>
      </div>
      <button class="btn btn-primary" id="mtbAddBtn" type="button">➕ В счёт</button>
    </div>
  </section>

  <section id="tab-invoice" class="tab-panel">
    <div class="invoice-toolbar">
      <button class="btn btn-primary" id="btnCopyInvoice">📋 Скопировать счёт</button>
      <button class="btn btn-ghost" id="btnPrintInvoice">🖨️ Печать</button>
      <div class="spacer"></div>
      <button class="btn btn-danger" id="btnClearInvoice">🗑 Очистить счёт</button>
    </div>
    <div class="card custom-line-card">
      <div class="settings-subtitle">+ Своя позиция</div>
      <div class="custom-line-row">
        <input type="text" id="clName" placeholder="Название (напр. Дизайн макета)">
        <input type="number" id="clQty" placeholder="Кол-во" value="1" min="0">
        <input type="number" id="clPrice" placeholder="Цена/шт, ₽" min="0">
        <select id="clType" style="border:1px solid var(--line);border-radius:7px;padding:11px 10px;background:#fff;font-size:16px;">
          <option value="service">Услуга</option>
          <option value="good">Товар</option>
        </select>
        <button class="btn btn-primary" id="clAddBtn" type="button">+ Добавить</button>
      </div>
    </div>
    <div id="invoiceWrap"></div>
  </section>

  <section id="tab-settings" class="tab-panel">
    <div class="settings-toolbar">
      <button class="btn btn-ghost" id="btnExportPrices">📤 Экспорт настроек (JSON)</button>
      <button class="btn btn-ghost" id="btnImportPrices">📥 Импорт настроек</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
      <div class="spacer"></div>
      <button class="btn btn-danger" id="btnResetPrices">↺ Сбросить к заводским ценам</button>
    </div>
    <div id="settingsRoot"></div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>

function clone(o){ return JSON.parse(JSON.stringify(o)); }

function deepMerge(base, override){
  if (override === undefined || override === null) return clone(base);
  if (Array.isArray(base)) return Array.isArray(override) ? override : clone(base);
  if (typeof base === "object" && typeof override === "object"){
    const out = {};
    const keys = new Set([...Object.keys(base), ...Object.keys(override)]);
    keys.forEach(k => { out[k] = deepMerge(base[k], override[k]); });
    return out;
  }
  return override !== undefined ? override : base;
}

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if (!raw) return clone(fallback);
    return JSON.parse(raw);
  }catch(e){ return clone(fallback); }
}
function saveJSON(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){ /* хранилище недоступно — молча игнорируем */ }
}

let PRICES = deepMerge(DEFAULT_PRICES, loadJSON(LS_PRICES, DEFAULT_PRICES));
let COMPANY = deepMerge(DEFAULT_COMPANY, loadJSON(LS_COMPANY, DEFAULT_COMPANY));
let INVOICE = loadJSON(LS_INVOICE, []);

function persistPrices(){ saveJSON(LS_PRICES, PRICES); }
function persistInvoice(){ saveJSON(LS_INVOICE, INVOICE); }
function persistCompany(){ saveJSON(LS_COMPANY, COMPANY); }

function fmtMoney(n){
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Math.ceil(n).toLocaleString("ru-RU", {minimumFractionDigits:0, maximumFractionDigits:0}) + " ₽";
}
function fmtNum(n, d){
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n.toLocaleString("ru-RU", {minimumFractionDigits:d||0, maximumFractionDigits:d||2});
}
// «Умное» округление для копирования в буфер: 2 знака после запятой максимум,
// но без лишних нулей (200 -> "200", 36.5 -> "36,5", 6.73 -> "6,73").
function fmtSmart(n){
  if (n === null || n === undefined || isNaN(n)) return "0";
  let s = n.toFixed(2);
  s = s.replace(/0+$/,"").replace(/\.$/,"");
  return s.replace(".", ",");
}
// Универсальная строка позиции для копирования: «Название - 12шт х 100 руб/шт = 1200 руб»
function clipLine(name, qty, unitPrice, total){
  return `${name} - ${fmtSmart(qty)}шт х ${fmtSmart(unitPrice)} руб/шт = ${fmtSmart(total)} руб`;
}
async function copyTextToClipboard(text, successMsg){
  try{
    await navigator.clipboard.writeText(text);
    toast(successMsg);
  }catch(e){
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); toast(successMsg); }
    catch(err){ toast("Не удалось скопировать автоматически — выдели текст вручную"); }
    document.body.removeChild(ta);
  }
}
function lookupTier(table, qty){
  const sorted = table.slice().sort((a,b)=>a[0]-b[0]);
  let coef = sorted.length ? sorted[0][1] : 1;
  for (const [th, c] of sorted){ if (qty >= th) coef = c; else break; }
  return coef;
}
function uid(){ return "_" + Math.random().toString(36).slice(2,9); }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._h);
  toast._h = setTimeout(()=> t.classList.remove("show"), 2200);
}
function el(tag, props={}, children=[]){
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach(c=>{
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

   Каждая услуга — это: id, группа, название, иконка, список полей формы
   и функция calc(values, P), которая возвращает результат расчёта.
   Чтобы добавить новую услугу — допиши новый объект в массив PRODUCTS.
   ========================================================================= */
function optKeys(obj){ return Object.keys(obj || {}); }

const PRODUCTS = [

// ---- ПЕЧАТЬ SRA3 -----------------------------------------------------------
{
  id:"sra3", group:"Печать", title:"Печать SRA3", icon:"🖨",
  invoiceType:"service",
  fields:[
    {key:"itemType", type:"select", label:"Тип изделия", default:"Лист",
      options:()=>["Лист"]}, // Конверт — добавим позже
    {key:"format", type:"select", label:"Формат изделия", default:"Свободный",
      options:(P)=> ["Свободный", ...optKeys(P.formats)]},
    {key:"itemWidth", type:"number", label:"Ширина изделия, мм", default:100, min:1,
      showIf:v=>v.format==="Свободный"},
    {key:"itemHeight", type:"number", label:"Высота изделия, мм", default:105, min:1,
      showIf:v=>v.format==="Свободный"},
    {key:"density", type:"select", label:"Плотность, г/м²", default:"300",
      options:(P)=> optKeys(P.sra3Grid)},
    {key:"colorMode", type:"select", label:"Цветность", default:"4x0",
      options:()=> ["4x0","4x4","4x1","1x0","1x1"]},
    {key:"lamination", type:"select", label:"Ламинация", default:"Нет",
      options:(P)=> optKeys(P.lamination.types)},
    {key:"finish", type:"select", label:"Мат / Глянц", default:"Глянцевая",
      options:(P)=> optKeys(P.lamination.finish), showIf:v=>v.lamination!=="Нет"},
    {key:"big", type:"select", label:"Биг", default:"Нет", options:()=>["Нет","Да"]},
    {key:"contourCut", type:"select", label:"Резка по контуру", default:"Нет",
      options:(P)=>["Нет",...optKeys(P.sra3Extras.contourCut)]},
    {key:"binding", type:"select", label:"Брошюровка", default:"Нет",
      options:()=>["Нет","Пружина","Скобы"]},
    {key:"bindingEdge", type:"select", label:"Край", default:"Длинный",
      options:()=>["Длинный","Короткий"], showIf:v=>v.binding!=="Нет"},
    {key:"qty", type:"number", label:"Тираж, шт", default:1, min:1},
    {key:"markup", type:"number", label:"Наценка, %", default:10, min:0},
    {key:"discount", type:"number", label:"Скидка клиента, %", default:0, min:0}
  ],
  calc(v,P){
    let iw, ih;
    if (v.format === "Свободный"){ iw=v.itemWidth; ih=v.itemHeight; }
    else { const f=P.formats[v.format]; iw=f?f.w:v.itemWidth; ih=f?f.h:v.itemHeight; }
    const sheetW=P.sheetSRA3.width, sheetH=P.sheetSRA3.height;
    const perSheet = Math.max(
      Math.floor(sheetW/iw)*Math.floor(sheetH/ih),
      Math.floor(sheetH/iw)*Math.floor(sheetW/ih)
    );
    if (!perSheet || perSheet<=0){
      return {error:`Изделие ${iw}х${ih} мм не помещается на лист SRA3 (${sheetW}х${sheetH} мм)`};
    }
    const sheetPrice = (P.sra3Grid[v.density]||{})[v.colorMode] || 0;
    const laminationPrice = v.lamination==="Нет" ? 0 :
      (P.lamination.types[v.lamination]||0) + (P.lamination.finish[v.finish]||0);
    let pricePerItem = (sheetPrice*1.8)/perSheet + laminationPrice/perSheet;
    const discCoef = lookupTier(P.tirazhDiscount, v.qty);
    // доп. услуги (добавляются уже к цене за шт, скидка за тираж на них не распространяется)
    if (v.big === "Да") pricePerItem += P.sra3Extras.bigPrice;
    if (v.contourCut !== "Нет") pricePerItem += P.sra3Extras.contourCut[v.contourCut]||0;
    if (v.binding === "Пружина"){
      const edgeMm = v.bindingEdge === "Короткий" ? Math.min(iw,ih) : Math.max(iw,ih);
      pricePerItem += P.sra3Extras.spring * edgeMm;
    } else if (v.binding === "Скобы"){
      pricePerItem += P.sra3Extras.staple;
    }
    const total = pricePerItem*discCoef*(1+v.markup/100)*(1-v.discount/100)*v.qty;
    const dimsOrFormat = v.format==="Свободный" ? `${iw}х${ih} мм` : v.format;
    const colorPlus = v.colorMode.replace("x","+");
    let specs = `Печать ${dimsOrFormat}, ${v.density} г, ${colorPlus}`;
    if (v.lamination!=="Нет"){
      const lamLabel = (P.lamination.labels||{})[v.lamination] || v.lamination;
      const finLabel = v.finish==="Матовая" ? "Матовая" : "Глянцевая";
      specs += `, ламинация ${lamLabel} ${finLabel}`;
    }
    if (v.big==="Да") specs += `, Биг ${v.qty}шт`;
    if (v.contourCut!=="Нет") specs += `, с резкой по контуру`;
    if (v.binding!=="Нет") specs += `, ${v.binding==="Пружина"?"пружина":"скобы"} по ${v.bindingEdge.toLowerCase()}у краю`;
    return { total, qty:v.qty, unitPrice: total/v.qty, specs };
  }
},

// ---- ПВХ ----------------------------------------------------------------------
{
  id:"pvc", group:"Жёсткие материалы", title:"ПВХ", icon:"🟦",
  invoiceType:"good",
  fields:[
    {key:"pvcType", type:"select", label:"Тип изделия", default:"Лист",
      options:()=>["Лист","Стенд","Табличка"]},
    {key:"thickness", type:"select", label:"Толщина ПВХ", default:"5 мм", options:(P)=>optKeys(P.pvc.thickness)},
    {key:"cutType", type:"select", label:"Тип резки", default:"Резка по форме", options:(P)=>optKeys(P.pvc.cutType)},
    {key:"width", type:"number", label:"Ширина, мм", default:500, min:1},
    {key:"height", type:"number", label:"Высота, мм", default:474, min:1},
    {key:"pocketFormat", type:"select", label:"Карман", default:"Нет",
      options:(P)=>optKeys(P.pvc.pockets), showIf:v=>v.pvcType==="Стенд"},
    {key:"pocketQty", type:"number", label:"Кол-во карманов", default:1, min:1,
      showIf:v=>v.pvcType==="Стенд" && v.pocketFormat!=="Нет"},
    {key:"qty", type:"number", label:"Тираж, шт", default:1, min:1},
    {key:"markup", type:"number", label:"Наценка, %", default:0, min:0},
    {key:"discount", type:"number", label:"Скидка, %", default:0, min:0}
  ],
  calc(v,P){
    const area = v.width*v.height/1e6;
    const price = P.pvc.thickness[v.thickness]||0;
    const cutCoef = P.pvc.cutType[v.cutType]||1;
    let pocketCost = 0;
    if (v.pvcType==="Стенд" && v.pocketFormat!=="Нет"){
      pocketCost = (P.pvc.pockets[v.pocketFormat]||0)*(v.pocketQty||1);
    }
    const total = (price*cutCoef*area + pocketCost)*(1+v.markup/100)*(1-v.discount/100)*v.qty;
    const w=v.width, h=v.height;
    let specs;
    if (v.pvcType==="Стенд"){
      const pocketPart = (v.pocketFormat!=="Нет") ? ` с карманами ${v.pocketFormat} ${v.pocketQty||1}шт` : "";
      specs = `ПВХ стенд ${v.thickness} ${w}х${h} мм${pocketPart}`;
    } else if (v.pvcType==="Табличка"){
      specs = `Табличка ПВХ ${v.thickness} ${w}х${h} мм`;
    } else {
      specs = `Изготовление ПВХ ${v.thickness} ${w}х${h} мм`;
    }
    return {total, qty:v.qty, unitPrice: total/v.qty, specs};
  }

    {key:"stellaThickness", type:"select", label:"Толщина", default:"2 мм",
      options:(P)=>optKeys(P.acrylic.thickness), showIf:v=>v.kind==="Стелла"},
    {key:"stellaWidth", type:"number", label:"Ширина, мм", default:100, min:1,
      showIf:v=>v.kind==="Стелла"},
    {key:"stellaHeight", type:"number", label:"Высота, мм", default:200, min:1,
      showIf:v=>v.kind==="Стелла"},
    {key:"stellaLeg", type:"number", label:"Ножка, мм", default:22, min:0,
      showIf:v=>v.kind==="Стелла"},
    // Медаль
    {key:"medalThickness", type:"select", label:"Толщина пластика", default:"4 мм",
      options:(P)=>optKeys(P.medals), showIf:v=>v.kind==="Медаль"},
    {key:"medalSize", type:"select", label:"Размер", default:"6 см",
      options:(P,v)=>optKeys(P.medals[v.medalThickness]||{}), showIf:v=>v.kind==="Медаль"},
    {key:"medalFastening", type:"select", label:"Крепление", default:"Люверс + лента атлас 24мм",
      options:()=>["Люверс + лента атлас 24мм","Нет"], showIf:v=>v.kind==="Медаль"},
    // Общее
    {key:"markup", type:"number", label:"Наценка, %", default:2, min:0,
      showIf:v=>v.kind!=="Медаль"},
    {key:"discount", type:"number", label:"Скидка, %", default:0, min:0,
      showIf:v=>v.kind!=="Медаль"},
    {key:"qty", type:"number", label:"Тираж, шт", default:1, min:1}
  ],
  invoiceType:"good",
  calc(v,P){
    if (v.kind === "Медаль"){
      const price = (P.medals[v.medalThickness]||{})[v.medalSize] || 0;
      const total = price*v.qty;
      const fasten = v.medalFastening!=="Нет" ? `, с лентой атлас 24мм, крепление люверс` : "";
      return {total, qty:v.qty, unitPrice: total/v.qty,
        specs:`Изготовление медали ${v.medalThickness} ${v.medalSize}, с УФ печатью${fasten}`};
    }
    if (v.kind === "Стелла"){
      const area = (v.stellaWidth*(v.stellaHeight+v.stellaLeg))/1e6;
      const price = P.acrylic.thickness[v.stellaThickness]||0;
      const total = price*area*(1+v.markup/100)*(1-v.discount/100)*v.qty;
      return {total, qty:v.qty, unitPrice: total/v.qty,
        specs:`Акрил стелла ${v.stellaThickness}, ${v.stellaWidth}х${v.stellaHeight} мм`};
    }
    // Лист — без ножки
    const area = (v.width*v.height)/1e6;
    const price = P.acrylic.thickness[v.thickness]||0;
    const total = price*area*(1+v.markup/100)*(1-v.discount/100)*v.qty;
    return {total, qty:v.qty, unitPrice: total/v.qty,
      specs:`Акрил ${v.thickness}, ${v.width}х${v.height} мм`};
  }
},

// ---- САМОКЛЕЙКА --------------------------------------------------------------
{
  id:"selfAdhesive", group:"Печать", title:"Самоклейка", icon:"🏷", invoiceType:"good",
  fields:[
    {key:"format", type:"select", label:"Формат", default:"Свободный",
      options:(P)=> ["Свободный", ...optKeys(P.selfAdhesive.presets), "<10см"]},
    {key:"width", type:"number", label:"Ширина, мм", default:200, min:1, showIf:v=>v.format==="Свободный"},
    {key:"height", type:"number", label:"Высота, мм", default:400, min:1, showIf:v=>v.format==="Свободный"},
    {key:"cutType", type:"select", label:"Тип резки", default:"На монтажке", options:(P)=>optKeys(P.selfAdhesive.cutType),
      showIf:v=>v.format==="Свободный"},
    {key:"smallWidth", type:"number", label:"Ширина наклейки, мм", default:70, min:1, showIf:v=>v.format==="<10см"},
    {key:"smallHeight", type:"number", label:"Высота наклейки, мм", default:70, min:1, showIf:v=>v.format==="<10см"},
    {key:"gap", type:"number", label:"Зазор между наклейками, мм", default:(P)=>P.selfAdhesive.smallRoll.gap, min:0,
      showIf:v=>v.format==="<10см"},
    {key:"qty", type:"number", label:"Тираж, шт", default:1, min:1},
    {key:"markup", type:"number", label:"Наценка, %", default:0, min:0},
    {key:"discount", type:"number", label:"Скидка, %", default:0, min:0}
  ],
  calc(v,P){
    if (v.format === "<10см"){
      const sr = P.selfAdhesive.smallRoll;
      const usableWidth = sr.rollWidth - sr.edgeMargin*2;
      const nPerRow = Math.max(1, Math.floor((usableWidth + v.gap) / (v.smallWidth + v.gap)));
      const rows = Math.ceil(v.qty / nPerRow);
      const fitQty = rows * nPerRow; // физически вместившееся количество (с учётом неполного последнего ряда)
      const lengthM = (rows * (v.smallHeight + v.gap)) / 1000;
      const areaM2 = (sr.rollWidth/1000) * lengthM; // платим за полную ширину рулона
      const cost = areaM2 * P.selfAdhesive.pricePerM2;
      const pricePerItem = (cost/fitQty)*(1+v.markup/100)*(1-v.discount/100);
      const total = pricePerItem*v.qty;
      return {total, qty:v.qty, unitPrice: pricePerItem,
        specs:`Печать наклейки ${v.smallWidth}х${v.smallHeight} мм (мелкий формат, ${nPerRow} в ряд)`};
    }
    if (v.format !== "Свободный"){
      const pr = P.selfAdhesive.presets[v.format];
      const pricePerItem = pr ? pr.price : 0;
      const total = pricePerItem*v.qty*(1+v.markup/100)*(1-v.discount/100);
      return {total, qty:v.qty, unitPrice: total/v.qty, specs:`Печать наклейки ${v.format}`};
    }
    const w=v.width, h=v.height;
    const cutCoef = P.selfAdhesive.cutType[v.cutType]||1;
    const pricePerItem = P.selfAdhesive.pricePerM2*(w/1000)*(h/1000)*cutCoef;
    const total = pricePerItem*v.qty*(1+v.markup/100)*(1-v.discount/100);
    const cutPhrase = v.cutType==="Без резки" ? "без резки" : v.cutType==="Резка плоттером" ? "с резкой" : "на монтажке";
    return {total, qty:v.qty, unitPrice: total/v.qty, specs:`Печать наклейки ${w}х${h} мм ${cutPhrase}`};
  }
},

{
  id:"dtf", group:"Нанесение", title:"ДТФ (DTF)", icon:"👕",
  invoiceType:"service",
  fields:[
    {key:"material", type:"select", label:"Материал", default:"Заказчика",
      options:()=>["Заказчика","Наш"]},
    {key:"ourItem", type:"select", label:"Изделие", default:"Футболка",
      options:(P)=>optKeys(P.dtf.ourItems), showIf:v=>v.material==="Наш"},
    {key:"prints", type:"list", label:"Нанесения (зоны печати на одном изделии)",
      addLabel:"нанесение", itemLabel:"Нанесение", minItems:1,
      itemFields:[
        {key:"format", type:"select", label:"Формат", default:"Свободный размер",
          options:(P)=> ["Свободный размер", ...optKeys(P.dtf.fixed)]},
        {key:"width", type:"number", label:"Ширина, мм", default:270, min:1,
          showIf:item=>item.format==="Свободный размер"},
        {key:"height", type:"number", label:"Высота, мм", default:330, min:1,
          showIf:item=>item.format==="Свободный размер"}
      ]},
    {key:"qty", type:"number", label:"Тираж, шт", default:2, min:1},
    {key:"markup", type:"number", label:"Наценка, %", default:20, min:0},
    {key:"discount", type:"number", label:"Скидка, %", default:0, min:0}
  ],
  calc(v,P){
    const prints = (v.prints && v.prints.length) ? v.prints : [{format:"Свободный размер", width:270, height:330}];
    let sumPerItem = 0;
    const labels = [];
    prints.forEach(pr=>{
      let raw;
      if (pr.format === "Свободный размер"){ raw = (pr.width*pr.height/1e6)*P.dtf.freePerM2; }
      else { raw = P.dtf.fixed[pr.format]||0; }
      sumPerItem += Math.max(P.dtf.minPrice, raw);
      labels.push(pr.format==="Свободный размер" ? `${pr.width}х${pr.height}мм` : pr.format);
    });
    // Если материал "Наш" — прибавляем цену изделия
    let itemPhrase;
    if (v.material==="Наш"){
      const ourItemPrice = P.dtf.ourItems[v.ourItem]||0;
      sumPerItem += ourItemPrice;
      // винительный падеж — таблица
      const accMap = {
        "Футболка":"футболку","Худи":"худи","Рубашка поло":"рубашку поло",
        "Сумка поясная":"сумку поясную","Шоппер":"шоппер","Мешок для обуви":"мешок для обуви"
      };
      itemPhrase = `на ${accMap[v.ourItem]||v.ourItem}`;
    } else {
      itemPhrase = "на вашем изделии";
    }
    const total = sumPerItem*v.qty*(1+v.markup/100)*(1-v.discount/100);
    const sizePart = labels.join(" + ");
    return {total, qty:v.qty, unitPrice: total/v.qty,
      specs:`ДТФ нанесение ${sizePart}, ${itemPhrase}`};
  }
},

{

    {key:"eyeletStep", type:"number", label:"Шаг люверсов, см", default:20, min:1, showIf:v=>v.finishing==="Люверс + проклейка"},
    {key:"rollUp", type:"select", label:"Ролл Ап / замена", default:"Нет", options:()=>["Нет","Ролл Ап конструкция","Замена полотна"]},
    {key:"qty", type:"number", label:"Тираж, шт", default:1, min:1},
    {key:"markup", type:"number", label:"Наценка, %", default:0, min:0},

const PRODUCT_GROUPS = ["Печать","Нанесение","Жёсткие материалы","Большой формат","Сувенирка"];

/* =========================================================================
   4. КАЛЬКУЛЯТОР — состояние и рендер
   ========================================================================= */
let currentProductId = PRODUCTS[0].id;
const formValues = {}; // productId -> {key:value}

function getProduct(id){ return PRODUCTS.find(p=>p.id===id); }

function getFieldValue(product, field){
  const store = formValues[product.id] || (formValues[product.id]={});
  if (store[field.key] === undefined){
    store[field.key] = typeof field.default === "function" ? field.default(PRICES) : field.default;
  }
  return store[field.key];
}
function setFieldValue(product, key, val){
  const store = formValues[product.id] || (formValues[product.id]={});
  store[key] = val;
}
function getValuesObj(product){
  const store = formValues[product.id] || (formValues[product.id]={});
  product.fields.forEach(f=>{
    if (store[f.key]===undefined) store[f.key] = typeof f.default === "function" ? f.default(PRICES) : f.default;
  });
  return store;
}

function renderProductNav(){
  const nav = document.getElementById("productNav");
  nav.innerHTML = "";
  PRODUCT_GROUPS.forEach(group=>{
    const items = PRODUCTS.filter(p=>p.group===group);
    if (!items.length) return;
    const wrap = el("div",{class:"nav-group"});
    wrap.appendChild(el("div",{class:"nav-group-title"},[group]));
    items.forEach(p=>{
      const btn = el("button",{
        class: "nav-item" + (p.id===currentProductId ? " active":""),
        type:"button",
        onClick: ()=>{ currentProductId=p.id; renderProductNav(); renderProductForm(); }
      },[ el("span",{class:"ico"},[p.icon]), p.title ]);
      wrap.appendChild(btn);
    });
    nav.appendChild(wrap);
  });
}

function renderProductForm(){
  const product = getProduct(currentProductId);
  const values = getValuesObj(product);
  const formEl = document.getElementById("productForm");
  formEl.innerHTML = "";
  formEl.appendChild(el("h2",{},[product.icon+" "+product.title]));
  formEl.appendChild(el("div",{class:"hint"},["Заполни параметры — итог считается сразу. Цены берутся из листа «Настройки цен»."]));

  const grid = el("div",{class:"field-grid"});
  product.fields.forEach(field=>{
    if (field.showIf && !field.showIf(values)) return;
    if (field.type === "list"){
      const fieldWrap = el("div",{class:"field full"});
      fieldWrap.appendChild(el("label",{},[field.label]));
      renderListField(fieldWrap, field, values);
      grid.appendChild(fieldWrap);
      return;
    }
    const fieldWrap = el("div",{class:"field"});
    fieldWrap.appendChild(el("label",{for:"f_"+field.key},[field.label]));
    let input;
    if (field.type==="select"){
      const opts = typeof field.options==="function" ? field.options(PRICES, values) : (field.options||[]);
      if (opts.indexOf(values[field.key]) === -1) values[field.key] = opts[0];
      input = el("select",{id:"f_"+field.key});
      opts.forEach(o=> input.appendChild(el("option",{value:o, ...(o===values[field.key]?{selected:"selected"}:{})},[o])));
      input.addEventListener("change", ()=>{ setFieldValue(product, field.key, input.value); renderProductForm(); });
    } else {
      input = el("input",{id:"f_"+field.key, type:"number", value:values[field.key],
        ...(field.min!==undefined?{min:field.min}:{}), step: field.step || "any"});
      input.addEventListener("input", ()=>{
        const num = parseFloat(input.value);
        setFieldValue(product, field.key, isNaN(num) ? 0 : num);
        updateResultPanel();
      });
    }
    fieldWrap.appendChild(input);
    grid.appendChild(fieldWrap);
  });
  formEl.appendChild(grid);
  updateResultPanel();
}

// Список повторяющихся под-записей (сейчас используется только для зон печати ДТФ).
// field.itemFields описывает поля ОДНОЙ записи списка — те же типы (number/select),
// что и обычные поля формы, плюс showIf(item) для условной видимости внутри записи.
function makeListItemDefault(field, P){
  const obj = {};
  field.itemFields.forEach(sf=>{ obj[sf.key] = typeof sf.default === "function" ? sf.default(P) : sf.default; });
  return obj;
}
function renderListField(container, field, values){
  if (!Array.isArray(values[field.key]) || !values[field.key].length){
    values[field.key] = [ makeListItemDefault(field, PRICES) ];
  }
  const list = values[field.key];
  const wrap = el("div",{class:"list-field"});
  list.forEach((item, idx)=>{
    const card = el("div",{class:"list-item-card"});
    const head = el("div",{class:"list-item-head"},[ el("span",{},[`${field.itemLabel||"Позиция"} ${idx+1}`]) ]);
    if (list.length > (field.minItems||1)){
      head.appendChild(el("button",{class:"icon-btn", type:"button", title:"Удалить",
        onClick:()=>{ list.splice(idx,1); renderProductForm(); }},["✕"]));
    }
    card.appendChild(head);
    const itemGrid = el("div",{class:"field-grid"});
    field.itemFields.forEach(sf=>{
      if (sf.showIf && !sf.showIf(item)) return;
      const fw = el("div",{class:"field"});
      fw.appendChild(el("label",{},[sf.label]));
      let input;
      if (sf.type === "select"){
        const opts = typeof sf.options === "function" ? sf.options(PRICES, item) : (sf.options||[]);
        if (opts.indexOf(item[sf.key]) === -1) item[sf.key] = opts[0];
        input = el("select",{});
        opts.forEach(o=> input.appendChild(el("option",{value:o, ...(o===item[sf.key]?{selected:"selected"}:{})},[o])));
        input.addEventListener("change", ()=>{ item[sf.key]=input.value; renderProductForm(); });
      } else {
        input = el("input",{type:"number", value:item[sf.key], ...(sf.min!==undefined?{min:sf.min}:{}), step:sf.step||"any"});
        input.addEventListener("input", ()=>{
          const num = parseFloat(input.value);
          item[sf.key] = isNaN(num) ? 0 : num;
          updateResultPanel();
        });
      }
      fw.appendChild(input);
      itemGrid.appendChild(fw);
    });
    card.appendChild(itemGrid);
    wrap.appendChild(card);
  });
  const addBtn = el("button",{class:"btn-add", type:"button"},["+ "+(field.addLabel||"добавить")]);
  addBtn.addEventListener("click", ()=>{
    list.push(makeListItemDefault(field, PRICES));
    renderProductForm();
  });
  wrap.appendChild(addBtn);
  container.appendChild(wrap);
}

function computeCurrent(){
  const product = getProduct(currentProductId);
  const values = getValuesObj(product);
  try{
    const result = product.calc(values, PRICES);
    if (!result.error){
      // цены — целые рубли, округление вверх; итог пересчитываем от округлённой цены за шт,
      // чтобы сумма в счёте всегда точно равнялась цене×количество
      result.unitPrice = Math.ceil(result.unitPrice);
      result.total = result.unitPrice * result.qty;
    }
    return {product, values, result};
  }catch(e){
    return {product, values, result:{error:"Не удалось рассчитать: проверь введённые значения."}};
  }
}

function updateResultPanel(){
  const {product, values, result} = computeCurrent();
  const panel = document.getElementById("resultPanel");
  const mtbSum = document.getElementById("mtbSum");
  const mtbBtn = document.getElementById("mtbAddBtn");
  panel.innerHTML = "";
  if (result.error){
    panel.appendChild(el("div",{class:"label"},["Результат"]));
    panel.appendChild(el("div",{class:"field-error"},[result.error]));
    mtbSum.textContent = "—";
    mtbBtn.disabled = true;
    mtbBtn.onclick = null;
    return;
  }
  const inner = el("div",{class:"corners"},[
    el("span",{class:"corner tl"}), el("span",{class:"corner tr"}),
    el("span",{class:"corner bl"}), el("span",{class:"corner br"})
  ]);
  inner.appendChild(el("div",{class:"label"},["Итого, "+product.title]));
  inner.appendChild(el("div",{class:"result-total"},[fmtMoney(result.total)]));
  inner.appendChild(el("div",{class:"unit"},[`${fmtMoney(result.unitPrice)} / шт · тираж ${fmtNum(result.qty)} шт`]));
  inner.appendChild(el("div",{class:"result-specs"},[result.specs||""]));
  panel.appendChild(inner);
  const actions = el("div",{class:"result-actions"});
  const copyBtn = el("button",{class:"btn btn-ghost btn-block", type:"button", onClick: ()=>{
    copyTextToClipboard(clipLine(result.specs, result.qty, result.unitPrice, result.total), "Строка скопирована");
  }},["📋 Скопировать"]);
  const addBtn = el("button",{class:"btn btn-primary btn-block", type:"button", onClick: ()=>addToInvoice(product, values, result)},
    ["➕ Добавить в счёт"]);
  actions.append(copyBtn, addBtn);
  panel.appendChild(actions);

  // та же сумма и то же действие — в закреплённой нижней панели для телефона
  mtbSum.textContent = fmtMoney(result.total);
  mtbBtn.disabled = false;
  mtbBtn.onclick = () => addToInvoice(product, values, result);
}

/* =========================================================================
   5. СЧЁТ (ЗАКАЗ)
   ========================================================================= */
function addToInvoice(product, values, result){
  INVOICE.push({
    id: uid(),
    name: result.specs || product.title,
    qty: result.qty,
    unitPrice: result.unitPrice,
    total: result.total,
    invoiceType: product.invoiceType || "good"
  });
  persistInvoice();
  renderInvoice();
  updateInvoiceBadge();
  toast("Добавлено в счёт: "+product.title);
}

let invoiceClientDiscount = loadJSON("tipo_inv_discount_v1", 0);
function persistDiscount(){ saveJSON("tipo_inv_discount_v1", invoiceClientDiscount); }

function invoiceSum(){
  const gross = INVOICE.reduce((s,i)=>s+i.total,0);
  return Math.ceil(gross*(1-invoiceClientDiscount/100));
}

function updateInvoiceBadge(){
  const badge = document.getElementById("invoiceCountBadge");
  badge.textContent = INVOICE.length ? `(${INVOICE.length})` : "";
}

function renderInvoice(){
  const wrap = document.getElementById("invoiceWrap");
  wrap.innerHTML = "";
  if (!INVOICE.length){
    wrap.appendChild(el("div",{class:"card invoice-empty"},["Счёт пуст. Посчитай позицию в «Калькуляторе» или добавь свою позицию выше."]));
    return;
  }
  const tableWrap = el("div",{class:"invoice-table-wrap"});
  const table = el("table",{class:"invoice"});
  const thead = el("thead",{},[ el("tr",{},[
    el("th",{},["№"]), el("th",{},["Наименование"]),
    el("th",{},["Кол-во"]), el("th",{},["Цена/шт"]), el("th",{},["Сумма"]), el("th",{})
  ])]);
  const tbody = el("tbody");
  INVOICE.forEach((item, idx)=>{
    const qtyInput = el("input",{class:"qty-edit", type:"number", min:"0", value:item.qty});
    qtyInput.addEventListener("change", ()=>{
      const q = parseFloat(qtyInput.value);
      if (!isNaN(q) && q>=0){
        item.qty = q; item.total = item.unitPrice*q;
        persistInvoice(); renderInvoice();
      }
    });
    const priceInput = el("input",{class:"price-edit", type:"number", min:"0", step:"1", value:item.unitPrice});
    priceInput.addEventListener("change", ()=>{
      const p = parseFloat(priceInput.value);
      if (!isNaN(p) && p>=0){
        item.unitPrice = Math.ceil(p); item.total = item.unitPrice*item.qty;
        persistInvoice(); renderInvoice();
      }
    });
    // переключатель Товар/Услуга
    const typeBtn = el("button",{class:"type-toggle "+(item.invoiceType==="service"?"type-service":"type-good"),
      type:"button", title:"Тип: Товар/Услуга"}, [item.invoiceType==="service"?"У":"Т"]);
    typeBtn.addEventListener("click", ()=>{
      item.invoiceType = item.invoiceType==="service" ? "good" : "service";
      persistInvoice(); renderInvoice();
    });
    const delBtn = el("button",{class:"row-del", type:"button", title:"Удалить строку", onClick: ()=>{
      INVOICE.splice(idx,1); persistInvoice(); renderInvoice(); updateInvoiceBadge();
    }},["✕"]);
    tbody.appendChild(el("tr",{},[
      el("td",{class:"idx", "data-label":"№"},[String(idx+1)]),
      el("td",{"data-label":"Наименование"},[item.name]),
      el("td",{"data-label":"Кол-во"},[qtyInput]),
      el("td",{class:"num", "data-label":"Цена/шт"},[priceInput]),
      el("td",{class:"num", "data-label":"Сумма"},[fmtMoney(item.total)]),
      el("td",{class:"action-cell"},[typeBtn, delBtn])
    ]));
  });
  table.append(thead, tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  // скидка клиента
  const discRow = el("div",{class:"discount-row"});
  discRow.appendChild(el("label",{},"Скидка клиента, %"));
  const discInput = el("input",{type:"number", min:"0", max:"100", step:"1", value:invoiceClientDiscount, class:"qty-edit"});
  discInput.addEventListener("change",()=>{
    const d = parseFloat(discInput.value);
    invoiceClientDiscount = isNaN(d)||d<0 ? 0 : d>100 ? 100 : d;
    persistDiscount(); renderInvoice();
  });
  discRow.appendChild(discInput);
  const gross = INVOICE.reduce((s,i)=>s+i.total,0);
  if (invoiceClientDiscount>0){
    discRow.appendChild(el("span",{class:"discount-saved"},
      [`−${fmtMoney(gross-invoiceSum())} экономия`]));
  }
  wrap.appendChild(discRow);

  wrap.appendChild(el("div",{class:"invoice-total-bar"},[
    el("span",{},["Итого к оплате:"]),
    el("span",{class:"sum"},[fmtMoney(invoiceSum())])
  ]));

  // кнопки копирования только наименование+кол-во (без цен)
  const grpBtns = el("div",{class:"invoice-group-btns"});
  const services = INVOICE.filter(i=>i.invoiceType==="service");
  const goods = INVOICE.filter(i=>i.invoiceType!=="service");
  if (services.length){
    const b = el("button",{class:"btn btn-ghost",type:"button"},["📋 Услуги (без цен)"]);
    b.addEventListener("click",()=>{
      const txt = services.map(i=>`${i.name} - ${fmtSmart(i.qty)}шт`).join("\n");
      copyTextToClipboard(txt,"Список услуг скопирован");
    });
    grpBtns.appendChild(b);
  }
  if (goods.length){
    const b = el("button",{class:"btn btn-ghost",type:"button"},["📋 Товары (без цен)"]);
    b.addEventListener("click",()=>{
      const txt = goods.map(i=>`${i.name} - ${fmtSmart(i.qty)}шт`).join("\n");
      copyTextToClipboard(txt,"Список товаров скопирован");
    });
    grpBtns.appendChild(b);
  }
  wrap.appendChild(grpBtns);
}

// Текст для отправки клиенту — разбит на Услуги / Товары
function buildInvoiceText(){
  const lines = [];
  if (COMPANY.name) lines.push(COMPANY.name);
  if (COMPANY.phone) lines.push(COMPANY.phone);
  if (COMPANY.note) lines.push(COMPANY.note);
  if (lines.length) lines.push("");

  const services = INVOICE.filter(i=>i.invoiceType==="service");
  const goods = INVOICE.filter(i=>i.invoiceType!=="service");

  if (services.length){
    lines.push("Услуги:");
    services.forEach(item=> lines.push(clipLine(item.name, item.qty, item.unitPrice, item.total)));
    lines.push("");
  }
  if (goods.length){
    lines.push("Товары:");
    goods.forEach(item=> lines.push(clipLine(item.name, item.qty, item.unitPrice, item.total)));
    lines.push("");
  }

  if (invoiceClientDiscount>0) lines.push(`Скидка: ${invoiceClientDiscount}%`);
  lines.push(`Итого: ${fmtSmart(invoiceSum())} рублей`);
  lines.push("");
  lines.push(`Оплата: ${COMPANY.payment || "Наличными / Счёт на Юр. лицо"}`);
  return lines.join("\n");
}

function copyInvoice(){
  if (!INVOICE.length){ toast("Счёт пуст — нечего копировать"); return; }
  copyTextToClipboard(buildInvoiceText(), "Счёт скопирован — можно вставлять в чат");
}

function onPricesChanged(){
  persistPrices();
  renderProductForm(); // пересчитать калькулятор с новыми ценами
}

// Простая карта "ключ -> число", например {"5 мм": 3750, ...}
function renderMapEditor(container, map, opts={}){
  const { step=0.01, addLabel="+ строка", newKeyBase="новое" } = opts;
  function rerender(){
    container.innerHTML = "";
    const list = el("div",{class:"kv-list"});
    Object.keys(map).forEach(key=>{
      const row = el("div",{class:"kv-row"});
      const ki = el("input",{type:"text", value:key});
      ki.addEventListener("change", ()=>{
        const nk = ki.value.trim();
        if (nk && nk!==key && !(nk in map)){
          const val = map[key]; delete map[key]; map[nk]=val;
          onPricesChanged(); rerender();
        } else { ki.value = key; }
      });
      const vi = el("input",{type:"number", step:String(step), value: map[key]==null ? "" : map[key]});
      vi.addEventListener("input", ()=>{
        const num = parseFloat(vi.value);
        map[key] = isNaN(num) ? 0 : num;
        onPricesChanged();
      });
      const del = el("button",{class:"icon-btn", type:"button", title:"Удалить"},["✕"]);
      del.addEventListener("click", ()=>{ delete map[key]; onPricesChanged(); rerender(); });
      row.append(ki, vi, del);
      list.appendChild(row);
    });
    container.appendChild(list);
    const addBtn = el("button",{class:"btn-add", type:"button"},[addLabel]);
    addBtn.addEventListener("click", ()=>{
      let nk = newKeyBase, i=1;
      while (nk in map) nk = newKeyBase+" "+(++i);
      map[nk] = 0; onPricesChanged(); rerender();
    });
    container.appendChild(addBtn);
  }
  rerender();
}

// Двумерная таблица "строка x столбец -> число", например сетка цен SRA3
function renderGridEditor(container, gridObj, opts={}){
  const { rowLabel="Строка", colLabel="Столбец" } = opts;
  function colKeys(){
    const set = new Set();
    Object.values(gridObj).forEach(row=> Object.keys(row).forEach(c=>set.add(c)));
    return Array.from(set);
  }
  function rerender(){
    container.innerHTML = "";
    const wrap = el("div",{class:"grid-table-wrap"});
    const cols = colKeys();
    const table = el("table",{class:"grid-table"});
    const headRow = el("tr",{},[ el("th",{},[rowLabel]) ]);
    cols.forEach(c=>{
      const th = el("th");
      const ci = el("input",{class:"col-key", type:"text", value:c});
      ci.addEventListener("change", ()=>{
        const nc = ci.value.trim();
        if (nc && nc!==c){
          Object.values(gridObj).forEach(row=>{
            if (c in row){ row[nc]=row[c]; delete row[c]; }
          });
          onPricesChanged(); rerender();
        } else { ci.value = c; }
      });
      th.appendChild(ci);
      headRow.appendChild(th);
    });
    const delColTh = el("th");
    headRow.appendChild(delColTh);
    const thead = el("thead",{},[headRow]);
    const tbody = el("tbody");
    Object.keys(gridObj).forEach(rk=>{
      const tr = el("tr");
      const rowKeyTd = el("td");
      const ri = el("input",{class:"row-key", type:"text", value:rk});
      ri.addEventListener("change", ()=>{
        const nrk = ri.value.trim();
        if (nrk && nrk!==rk && !(nrk in gridObj)){
          gridObj[nrk]=gridObj[rk]; delete gridObj[rk];
          onPricesChanged(); rerender();
        } else { ri.value = rk; }
      });
      rowKeyTd.appendChild(ri);
      tr.appendChild(rowKeyTd);
      cols.forEach(c=>{
        const td = el("td");
        const vi = el("input",{type:"number", step:"0.01", value: gridObj[rk][c]==null ? "" : gridObj[rk][c]});
        vi.addEventListener("input", ()=>{
          const num = parseFloat(vi.value);
          gridObj[rk][c] = isNaN(num) ? 0 : num;
          onPricesChanged();
        });
        td.appendChild(vi);
        tr.appendChild(td);
      });
      const delTd = el("td");
      const delBtn = el("button",{class:"icon-btn", type:"button", title:"Удалить строку"},["✕"]);
      delBtn.addEventListener("click", ()=>{ delete gridObj[rk]; onPricesChanged(); rerender(); });
      delTd.appendChild(delBtn);
      tr.appendChild(delTd);
      tbody.appendChild(tr);
    });
    table.append(thead, tbody);
    wrap.appendChild(table);
    container.appendChild(wrap);
    const btnRow = el("div",{style:"display:flex;gap:8px;"});
    const addRowBtn = el("button",{class:"btn-add", type:"button"},["+ "+rowLabel.toLowerCase()]);
    addRowBtn.addEventListener("click", ()=>{
      let nk="новая", i=1; while (nk in gridObj) nk="новая "+(++i);
      const obj={}; cols.forEach(c=>obj[c]=0); gridObj[nk]=obj; onPricesChanged(); rerender();
    });
    const addColBtn = el("button",{class:"btn-add", type:"button"},["+ "+colLabel.toLowerCase()]);
    addColBtn.addEventListener("click", ()=>{
      let nc="новый", i=1; while (cols.includes(nc)) nc="новый "+(++i);
      Object.values(gridObj).forEach(row=> row[nc]=0); onPricesChanged(); rerender();
    });
    btnRow.append(addRowBtn, addColBtn);
    container.appendChild(btnRow);
  }
  rerender();
}

/* =========================================================================
   7. ИНИЦИАЛИЗАЦИЯ, ВКЛАДКИ, КНОПКИ
   ========================================================================= */
function switchTab(tab){
  document.querySelectorAll(".tab-btn").forEach(b=> b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll(".tab-panel").forEach(p=> p.classList.toggle("active", p.id==="tab-"+tab));
}

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=> switchTab(btn.dataset.tab));
});

document.getElementById("btnCopyInvoice").addEventListener("click", copyInvoice);
document.getElementById("btnPrintInvoice").addEventListener("click", ()=> window.print());
document.getElementById("btnClearInvoice").addEventListener("click", ()=>{
  if (!INVOICE.length) return;
  if (confirm("Очистить весь счёт?")){ INVOICE = []; persistInvoice(); renderInvoice(); updateInvoiceBadge(); }
});

document.getElementById("clAddBtn").addEventListener("click", ()=>{
  const nameEl = document.getElementById("clName");
  const qtyEl = document.getElementById("clQty");
  const priceEl = document.getElementById("clPrice");
  const name = nameEl.value.trim();
  const qty = parseFloat(qtyEl.value);
  const price = parseFloat(priceEl.value);
  if (!name){ toast("Укажи название позиции"); return; }
  if (isNaN(qty) || qty<=0){ toast("Укажи количество"); return; }
  if (isNaN(price) || price<0){ toast("Укажи цену"); return; }
  const roundedPrice = Math.ceil(price);
  const clType = document.getElementById("clType").value;
  INVOICE.push({id:uid(), name, qty, unitPrice:roundedPrice, total:roundedPrice*qty, invoiceType:clType});
  persistInvoice(); renderInvoice(); updateInvoiceBadge();
  nameEl.value=""; qtyEl.value="1"; priceEl.value="";
  toast("Добавлено: "+name);
});

document.getElementById("btnResetPrices").addEventListener("click", ()=>{
  if (confirm("Сбросить все цены к заводским значениям? Свои изменения в настройках будут потеряны.")){
    PRICES = clone(DEFAULT_PRICES);
    persistPrices();
    renderSettings();
    renderProductForm();
    toast("Цены сброшены к заводским");
  }
});
document.getElementById("btnExportPrices").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(PRICES, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "tipografia-prices.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
document.getElementById("btnImportPrices").addEventListener("click", ()=> document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      PRICES = deepMerge(DEFAULT_PRICES, data);
      persistPrices(); renderSettings(); renderProductForm();
      toast("Настройки цен импортированы");
    }catch(err){ alert("Не удалось прочитать файл: это должен быть JSON, экспортированный этим же приложением."); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

renderProductNav();
renderProductForm();
renderInvoice();
updateInvoiceBadge();
renderSettings();

</script>
