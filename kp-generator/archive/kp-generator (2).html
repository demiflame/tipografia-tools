<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор КП</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f3ef;
    --paper-card:#ffffff;
    --ink:#1c1c1a;
    --ink-soft:#5b5b56;
    --line:#dcdad2;
    --red:#c41230;
    --red-dark:#9c0e26;
    --green:#1f7a4d;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.05) 1px, transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding:20px 14px 60px;
  }

  .shell{
    max-width:640px;
    margin:0 auto;
  }

  .masthead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    padding:0 2px;
  }
  .masthead h1{
    font-size:15px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    margin:0;
  }
  .masthead .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.04em;
  }

  .card{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    position:relative;
    padding:22px 18px 20px;
    margin-bottom:14px;
  }
  /* registration-mark corners, a nod to print-shop crop/reg marks */
  .card::before,.card::after{
    content:"";
    position:absolute;
    width:11px;height:11px;
    background:
      linear-gradient(var(--ink) 0 0) center/100% 1px no-repeat,
      linear-gradient(90deg, var(--ink) 0 0) center/1px 100% no-repeat;
    opacity:.35;
  }
  .card::before{top:-1px;left:-1px;}
  .card::after{bottom:-1px;right:-1px;}

  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .field{
    margin-bottom:12px;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  input[type=text], input[type=date], input[type=number]{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14.5px;
    background:#fff;
    color:var(--ink);
  }
  input:focus{
    outline:none;
    border-color:var(--ink);
  }

  .doc-fields{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 10px;
  }
  .doc-fields .field.full{grid-column:1/-1;}

  .item-row-inputs{
    display:grid;
    grid-template-columns:1fr;
    gap:0;
  }
  .qty-price{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 10px;
  }

  .btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:.02em;
    border:none;
    border-radius:var(--radius);
    padding:11px 16px;
    cursor:pointer;
    transition:transform .05s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-add{
    background:var(--ink);
    color:#fff;
    width:100%;
    margin-top:4px;
  }
  .btn-add:hover{opacity:.88;}

  .items-table{
    width:100%;
    border-collapse:collapse;
    margin-top:4px;
    font-size:13px;
  }
  .items-table th{
    text-align:left;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
    border-bottom:1px solid var(--line);
    padding:6px 4px;
    font-weight:500;
  }
  .items-table td{
    padding:8px 4px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .items-table td.num{
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink-soft);
    width:22px;
  }
  .items-table td.name-cell{
    word-break:break-word;
  }
  .items-table td.num-col{
    font-family:'IBM Plex Mono', monospace;
    text-align:right;
    white-space:nowrap;
  }
  .del-btn{
    background:none;
    border:none;
    color:var(--red);
    font-size:16px;
    line-height:1;
    cursor:pointer;
    padding:2px 4px;
  }
  .del-btn:hover{color:var(--red-dark);}

  .empty-state{
    font-size:12.5px;
    color:var(--ink-soft);
    padding:14px 2px;
    text-align:center;
    font-style:italic;
  }

  .total-line{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:12px;
    padding-top:10px;
    border-top:2px solid var(--ink);
  }
  .total-line .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
  }
  .total-line .value{
    font-family:'IBM Plex Mono', monospace;
    font-size:19px;
    font-weight:600;
  }

  .actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:16px;
  }
  .btn-preview{
    background:#fff;
    border:1px solid var(--ink);
    color:var(--ink);
  }
  .btn-preview:hover{background:#f1f0eb;}
  .btn-generate{
    background:var(--red);
    color:#fff;
  }
  .btn-generate:hover{background:var(--red-dark);}
  .btn-generate:disabled{
    background:var(--ink-soft);
    cursor:default;
  }

  .hint{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:10px;
    line-height:1.5;
  }

  /* modal */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(20,20,18,.55);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:24px 14px;
    overflow-y:auto;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:#fff;
    max-width:560px;
    width:100%;
    border-radius:var(--radius);
    padding:24px 20px;
    position:relative;
  }
  .modal-close{
    position:absolute;
    top:12px; right:12px;
    background:none;
    border:none;
    font-size:20px;
    cursor:pointer;
    color:var(--ink-soft);
    line-height:1;
  }
  .preview-doc{
    font-size:13px;
    line-height:1.6;
  }
  .preview-doc h2{
    font-size:14px;
    margin:0 0 14px;
    padding-right:20px;
  }
  .preview-doc table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:12px;
    font-size:12.5px;
  }
  .preview-doc th, .preview-doc td{
    border:1px solid var(--line);
    padding:6px 7px;
    text-align:left;
  }
  .preview-doc th{
    background:#f7f6f2;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
  }
  .preview-doc .num-col{font-family:'IBM Plex Mono', monospace; text-align:right;}
  .preview-total{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    margin-top:8px;
  }

  @media (min-width:760px){
    body{padding:40px 20px 80px;}
    .shell{max-width:50%; min-width:600px;}
  }

  .toast{
    position:fixed;
    bottom:18px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink);
    color:#fff;
    font-size:13px;
    padding:10px 16px;
    border-radius:var(--radius);
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:60;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="shell">

  <div class="masthead">
    <h1>Генератор КП</h1>
    <span class="tag">v1.0</span>
  </div>

  <div class="card">
    <p class="section-label">Документ</p>
    <div class="doc-fields">
      <div class="field">
        <label for="fNumber">Номер документа</label>
        <input type="text" id="fNumber" placeholder="12">
      </div>
      <div class="field">
        <label for="fDate">Дата</label>
        <input type="date" id="fDate">
      </div>
      <div class="field full">
        <label for="fPartner">Партнёр (название компании)</label>
        <input type="text" id="fPartner" placeholder="ООО «Ромашка»">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-label">Добавить позицию</p>
    <div class="item-row-inputs">
      <div class="field">
        <label for="iName">Наименование товара / услуги</label>
        <input type="text" id="iName" placeholder="Визитки 90×50, 4+4, мелованная 300г">
      </div>
      <div class="qty-price">
        <div class="field">
          <label for="iQty">Количество</label>
          <input type="number" id="iQty" min="0" step="1" placeholder="1">
        </div>
        <div class="field">
          <label for="iPrice">Цена, ₽</label>
          <input type="number" id="iPrice" min="0" step="1" placeholder="0">
        </div>
      </div>
    </div>
    <button class="btn btn-add" id="addItemBtn">Добавить позицию</button>
  </div>

  <div class="card">
    <p class="section-label">Спецификация</p>
    <table class="items-table" id="itemsTable">
      <thead>
        <tr>
          <th style="width:22px;">№</th>
          <th>Наименование</th>
          <th style="text-align:right;">Кол-во</th>
          <th style="text-align:right;">Цена</th>
          <th style="text-align:right;">Сумма</th>
          <th style="width:20px;"></th>
        </tr>
      </thead>
      <tbody id="itemsBody">
      </tbody>
    </table>
    <div id="emptyState" class="empty-state">Позиций пока нет — добавьте первую выше</div>

    <div class="total-line">
      <span class="label">Итого</span>
      <span class="value" id="totalValue">0 ₽</span>
    </div>

    <div class="actions">
      <button class="btn btn-preview" id="previewBtn">Предпросмотр</button>
      <button class="btn btn-generate" id="generateBtn" disabled>Сгенерировать .docx</button>
    </div>
    <p class="hint">Файл собирается прямо в браузере на основе шаблона — данные никуда не отправляются.</p>
  </div>

</div>

<div class="modal-overlay" id="previewOverlay">
  <div class="modal-box">
    <button class="modal-close" id="closePreview">×</button>
    <div class="preview-doc" id="previewContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

/* =========================================================
   Число прописью (рубли, без копеек)
   ========================================================= */
function numberToWordsRu(num) {
  num = Math.round(Math.abs(num));
  if (num === 0) return 'Ноль рублей';

  const ones = ['', 'один', 'два', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
  const onesFem = ['', 'одна', 'две', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
  const teens = ['десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать','шестнадцать','семнадцать','восемнадцать','девятнадцать'];
  const tens = ['', '', 'двадцать','тридцать','сорок','пятьдесят','шестьдесят','семьдесят','восемьдесят','девяносто'];
  const hundreds = ['', 'сто','двести','триста','четыреста','пятьсот','шестьсот','семьсот','восемьсот','девятьсот'];

  function triplet(n, fem) {
    let words = [];
    const h = Math.floor(n / 100);
    const rem = n % 100;
    if (h) words.push(hundreds[h]);
    if (rem >= 10 && rem < 20) {
      words.push(teens[rem - 10]);
    } else {
      const t = Math.floor(rem / 10);
      const o = rem % 10;
      if (t) words.push(tens[t]);
      if (o) words.push(fem ? onesFem[o] : ones[o]);
    }
    return words;
  }

  function pluralize(n, forms) {
    const n100 = n % 100;
    const n10 = n % 10;
    if (n100 >= 11 && n100 <= 14) return forms[2];
    if (n10 === 1) return forms[0];
    if (n10 >= 2 && n10 <= 4) return forms[1];
    return forms[2];
  }

  const billions = Math.floor(num / 1e9) % 1000;
  const millions = Math.floor(num / 1e6) % 1000;
  const thousands = Math.floor(num / 1e3) % 1000;
  const units = num % 1000;

  let parts = [];

  if (billions) {
    parts.push(...triplet(billions, false));
    parts.push(pluralize(billions, ['миллиард', 'миллиарда', 'миллиардов']));
  }
  if (millions) {
    parts.push(...triplet(millions, false));
    parts.push(pluralize(millions, ['миллион', 'миллиона', 'миллионов']));
  }
  if (thousands) {
    parts.push(...triplet(thousands, true));
    parts.push(pluralize(thousands, ['тысяча', 'тысячи', 'тысяч']));
  }
  if (units || parts.length === 0) {
    parts.push(...triplet(units, false));
  }
  parts.push(pluralize(units || (num < 1000 ? num : 1), ['рубль', 'рубля', 'рублей']));

  let str = parts.join(' ');
  str = str.charAt(0).toUpperCase() + str.slice(1);
  return str;
}

/* =========================================================
   Форматирование
   ========================================================= */
function formatRub(n) {
  return Math.round(n).toLocaleString('ru-RU');
}
function formatDateRu(isoStr) {
  if (!isoStr) return '';
  const [y, m, d] = isoStr.split('-');
  return `${d}.${m}.${y}`;
}

/* =========================================================
   Рендер списка позиций
   ========================================================= */
function calcTotal() {
  return items.reduce((sum, it) => sum + it.qty * it.price, 0);
}

function render() {
  itemsBody.innerHTML = '';
  if (items.length === 0) {
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
    items.forEach((it, idx) => {
      const tr = document.createElement('tr');
      const sum = it.qty * it.price;
      tr.innerHTML = `
        <td class="num">${idx + 1}</td>
        <td class="name-cell">${escapeHtml(it.name)}</td>
        <td class="num-col">${it.qty}</td>
        <td class="num-col">${formatRub(it.price)}</td>
        <td class="num-col">${formatRub(sum)}</td>
        <td><button class="del-btn" data-idx="${idx}" title="Удалить">×</button></td>
      `;
      itemsBody.appendChild(tr);
    });
  }
  const total = calcTotal();
  totalValue.textContent = formatRub(total) + ' ₽';
  generateBtn.disabled = items.length === 0;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

itemsBody.addEventListener('click', (e) => {
  const btn = e.target.closest('.del-btn');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx, 10);
  items.splice(idx, 1);
  render();
});

/* =========================================================
   Добавление позиции
   ========================================================= */
addItemBtn.addEventListener('click', () => {
  const name = iName.value.trim();
  const qty = parseFloat(iQty.value);
  const price = parseFloat(iPrice.value);

  if (!name) { showToast('Укажите наименование'); iName.focus(); return; }
  if (!qty || qty <= 0) { showToast('Укажите количество'); iQty.focus(); return; }
  if (isNaN(price) || price < 0) { showToast('Укажите цену'); iPrice.focus(); return; }

  items.push({ name, qty, price });
  iName.value = '';
  iQty.value = '';
  iPrice.value = '';
  iName.focus();
  render();
});

// добавление по Enter из поля цены
iPrice.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addItemBtn.click();
});

/* =========================================================
   Toast
   ========================================================= */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* =========================================================
   Предпросмотр
   ========================================================= */
previewBtn.addEventListener('click', () => {
  const number = fNumber.value.trim() || '—';
  const date = formatDateRu(fDate.value) || '—';
  const partner = fPartner.value.trim() || '—';
  const total = calcTotal();

  let rows = items.map((it, idx) => `
    <tr>
      <td class="num-col">${idx + 1}</td>
      <td>${escapeHtml(it.name)}</td>
      <td class="num-col">${it.qty}</td>
      <td class="num-col">${formatRub(it.price)}</td>
      <td class="num-col">${formatRub(it.qty * it.price)}</td>
    </tr>
  `).join('');

  if (!rows) {
    rows = `<tr><td colspan="5" style="text-align:center;color:#999;">Нет позиций</td></tr>`;
  }

  previewContent.innerHTML = `
    <h2>Коммерческое предложение № ${escapeHtml(number)} от ${date} г. для ${escapeHtml(partner)}</h2>
    <table>
      <thead>
        <tr><th>№</th><th>Наименование</th><th>Кол-во</th><th>Цена</th><th>Сумма</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="preview-total">
      Итого: ${formatRub(total)} (${numberToWordsRu(total)}) рублей 00 копеек, НДС не облагается.
    </div>
  `;
  previewOverlay.classList.add('open');
});

closePreview.addEventListener('click', () => previewOverlay.classList.remove('open'));
previewOverlay.addEventListener('click', (e) => {
  if (e.target === previewOverlay) previewOverlay.classList.remove('open');
});

/* =========================================================
   Генерация .docx
   ========================================================= */
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

function base64ToUint8Array(base64) {
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

generateBtn.addEventListener('click', () => {
  try {
    const number = fNumber.value.trim();
    const date = formatDateRu(fDate.value);
    const partner = fPartner.value.trim();

    if (!number) { showToast('Укажите номер документа'); fNumber.focus(); return; }
    if (!date) { showToast('Укажите дату'); fDate.focus(); return; }
    if (!partner) { showToast('Укажите партнёра'); fPartner.focus(); return; }

    const total = calcTotal();

    const data = {
      number,
      date,
      partner,
      items: items.map((it, idx) => ({
        num: idx + 1,
        name: it.name,
        qty: it.qty,
        price: formatRub(it.price),
        sum: formatRub(it.qty * it.price),
      })),
      total: formatRub(total),
      totalWords: numberToWordsRu(total),
    };

    const zip = new PizZip(base64ToUint8Array(TEMPLATE_BASE64));
    const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
    doc.render(data);

    const out = doc.getZip().generate({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    });
    downloadBlob(out, `КП №${number}.docx`);
    showToast('Документ сгенерирован');
  } catch (err) {
    console.error(err);
    showToast('Ошибка генерации — см. консоль');
  }
});

render();
</script>
